hosts:
  - host_id: staging-1
    alias: staging
    host: 10.0.0.12
    port: 22
    username: deploy
    auth_mode: ssh_config
    ssh_config_host: staging
    default_workdir: /srv/myapp
    allowed_paths:
      - /srv/myapp
      - /var/log/myapp
      - /etc/myapp
    allow_sudo: false
    tags:
      - staging
      - linux
  - host_id: demo-password-host
    alias: demo-password
    host: YOUR_SERVER_IP
    port: 22
    username: root
    auth_mode: password
    password: CHANGE_ME
    default_workdir: /root
    allowed_paths:
      - /root
      - /etc
      - /tmp
      - /var/log
    allow_sudo: true
    tags:
      - demo
      - linux
