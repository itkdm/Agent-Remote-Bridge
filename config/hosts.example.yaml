hosts:
  - host_id: ssh-key-host
    alias: ssh-key
    host: YOUR_SERVER_IP
    port: 22
    username: root
    auth_mode: key_path
    private_key_path: C:/Users/YOUR_USER/.ssh/id_ed25519
    default_workdir: /root
    allowed_paths:
      - /root
      - /etc
      - /tmp
      - /var/log
    allow_sudo: true
    tags:
      - preferred
      - key
      - linux
  - host_id: ssh-config-host
    alias: ssh-config
    host: YOUR_SERVER_IP
    port: 22
    username: root
    auth_mode: ssh_config
    ssh_config_host: my-server
    default_workdir: /root
    allowed_paths:
      - /root
      - /etc
      - /tmp
      - /var/log
    allow_sudo: true
    tags:
      - preferred
      - ssh-config
      - linux
  - host_id: demo-password-host
    alias: demo-password
    host: YOUR_SERVER_IP
    port: 22
    username: root
    auth_mode: password
    password_env: ARB_DEMO_SERVER_PASSWORD
    default_workdir: /root
    allowed_paths:
      - /root
      - /etc
      - /tmp
      - /var/log
    allow_sudo: true
    tags:
      - demo
      - linux
