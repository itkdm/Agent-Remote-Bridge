name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit and integration tests
        run: |
          python -m pytest

      - name: Run local smoke check
        env:
          PYTHONPATH: src
        run: |
          python -c "import asyncio; from agent_remote_bridge.server import create_server; tools = asyncio.run(create_server().list_tools()); names = {tool.name for tool in tools}; expected = {'list_hosts', 'open_session', 'get_session_state', 'close_session', 'exec_remote', 'read_remote_file', 'list_remote_dir', 'get_system_facts', 'tail_system_log', 'check_service_status'}; missing = expected - names; assert not missing, f'Missing tools: {sorted(missing)}'"
          python -m agent_remote_bridge.main --help
